{% extends "bootstrap.html" %}
{% block title %}Criar conta — to-be list{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 col-xl-4">

      <div class="text-center mb-4">
        <h1 class="h3 fw-semibold mb-1">to-be list</h1>
        <p class="text-muted small mb-0">Comece sua lista em menos de 30 segundos.</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="card-title mb-3">Criar conta</h4>

          <form method="post" action="{{ url_for('auth.register') }}">
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="nome" name="nome"
                     placeholder="usuario" required autofocus>
              <label for="nome">Nome de usuário</label>
            </div>

            <div class="mb-3">
              <div class="form-floating">
                <input type="tel" class="form-control" id="telefone" name="telefone"
                       placeholder="+55 65 99999-9999"
                       pattern="^\+55 \d{2} \d{5}-\d{4}$" required>
                <label for="telefone">Telefone</label>
              </div>
              <div class="form-text">Formato: +55 65 99999-9999</div>
            </div>

            <div class="mb-4">
              <div class="form-floating">
                <input type="password" class="form-control" id="senha" name="senha"
                       placeholder="senha" minlength="8" required>
                <label for="senha">Senha</label>
              </div>
              <div class="form-text">Mínimo 8 caracteres</div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Criar conta</button>
          </form>
        </div>
      </div>

      <p class="text-center text-muted small mt-3">
        Já tem conta?
        <a href="{{ url_for('auth.login') }}" class="link-primary fw-semibold">Entrar</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
