{# templates/_navbar.html — parcial incluída pelo base.html quando há usuário logado #}
<nav class="navbar bg-dark fixed-top border-bottom border-body" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('tarefas.home') }}">
      Área de trabalho - Bem vindo, {{ current_user.user }}
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
            aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end" tabindex="-1"
         id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'tarefas.home' %}active{% endif %}"
               {% if request.endpoint == 'tarefas.home' %}aria-current="page"{% endif %}
               href="{{ url_for('tarefas.home') }}">Lista de tarefas</a>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
              Conta
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{{ url_for('tarefas.home', filtro='concluidas') }}">Concluídas</a></li>
              <li><a class="dropdown-item" href="{{ url_for('tarefas.home', filtro='pendentes') }}">Pendentes</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}">Sair</a></li>
              <li><a class="dropdown-item" href="{{ url_for('user.profile_user') }}">Editar perfil</a></li>
            </ul>
          </li>
        </ul>
        <form class="d-flex mt-3" role="search" method="get" action="{{ url_for('tarefas.home') }}">
          <input class="form-control me-2" type="search" name="q"
                 placeholder="Buscar tarefa…" aria-label="Search"
                 value="{{ request.args.get('q', '') }}"/>
          <button class="btn btn-outline-success" type="submit">Buscar</button>
        </form>
      </div>
    </div>
  </div>
</nav>
