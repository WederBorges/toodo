{% extends "bootstrap.html" %}
{% block title %}Entrar — to-be list{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center px-3"
     style="background:#0D1117;">
  <div style="width:100%; max-width:400px;">

    <!-- Logo + título -->
    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='favicon.svg') }}"
           width="46" height="46" alt="To-be list" class="mb-3">
      <h1 style="font-size:22px; font-weight:700; color:#E6EDF3; letter-spacing:-0.02em; margin-bottom:4px;">
        To-be list
      </h1>
      <p style="font-size:13px; color:#6E7681; margin:0;">Entre para continuar suas tarefas.</p>
    </div>

    <!-- Card -->
    <div class="card shadow-lg" style="background:#161B22; border:1px solid rgba(255,255,255,0.07);">
      <div class="card-body p-4">
        <h4 style="font-size:15px; font-weight:600; color:#E6EDF3; margin-bottom:20px;
                   font-family:'Courier New', monospace; min-height:1.5em;">
          <span id="tw-text" style="color:#00C0CC;"></span><span id="tw-cursor"
            style="display:inline-block; width:2px; height:1em; background:#00C0CC;
                   vertical-align:middle; margin-left:2px; animation:tw-blink .7s step-end infinite;">
          </span>
        </h4>
        <style>
          @keyframes tw-blink { 50% { opacity: 0; } }
        </style>
        <script>
          (function () {
            var phrases = [
              "Bem-vindo de volta.",
              "Estávamos com saudades!",
              "Pronto para ser produtivo?",
            ];
            var el = document.getElementById('tw-text');
            var pi = 0, ci = 0, deleting = false, pause = 0;
            function tick() {
              var phrase = phrases[pi];
              if (pause > 0) { pause--; setTimeout(tick, 80); return; }
              if (!deleting) {
                el.textContent = phrase.slice(0, ++ci);
                if (ci === phrase.length) { deleting = true; pause = 22; }
                setTimeout(tick, 75);
              } else {
                el.textContent = phrase.slice(0, --ci);
                if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; pause = 5; }
                setTimeout(tick, 38);
              }
            }
            tick();
          })();
        </script>

        <form method="post" action="{{ url_for('auth.login') }}">

          <div class="mb-3">
            <label for="nome" class="form-label"
                   style="font-size:11px; font-weight:600; letter-spacing:0.06em;
                          text-transform:uppercase; color:#8B949E;">
              Usuário
            </label>
            <input type="text" class="form-control" id="nome" name="nome"
                   placeholder="seu_usuario" required autofocus>
          </div>

          <div class="mb-3">
            <label for="senha" class="form-label"
                   style="font-size:11px; font-weight:600; letter-spacing:0.06em;
                          text-transform:uppercase; color:#8B949E;">
              Senha
            </label>
            <input type="password" class="form-control" id="senha" name="senha"
                   placeholder="••••••••" required>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember" name="remember"
                     style="accent-color:#00C0CC;">
              <label class="form-check-label" for="remember"
                     style="font-size:13px; color:#8B949E;">
                Lembrar de mim
              </label>
            </div>
            <a href="#" style="font-size:12px; color:#00C0CC; text-decoration:none; font-weight:500;">
              Esqueci a senha
            </a>
          </div>

          <button type="submit" class="btn btn-primary w-100"
                  style="padding:11px; font-size:14px; font-weight:700; letter-spacing:0.02em;">
            Entrar
          </button>

        </form>
      </div>
    </div>

    <!-- Link de registro -->
    <p class="text-center mt-3" style="font-size:13px; color:#6E7681; margin:0;">
      Sem conta?
      <a href="{{ url_for('auth.register') }}"
         style="color:#00C0CC; text-decoration:none; font-weight:600;">
        Registre-se
      </a>
    </p>

  </div>
</div>
{% endblock %}
